services:
  # PostgreSQL Database
  # Credentials are parsed from DATABASE_URL and set via POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
  postgres:
    image: postgres:${POSTGRES_VERSION:-18-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-smartplay-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartplay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartplay_password}
      POSTGRES_DB: ${POSTGRES_DB:-smartplay}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - smartplay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartplay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Application (using pre-built image from GHCR)
  smartplay-hk-oss:
    image: ghcr.io/lst97/smartplay-hk-oss:latest
    container_name: ${APP_CONTAINER_NAME:-smartplay-app}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      VITE_CLOUDFLARE_TURNSTILE_SITE_KEY: ${VITE_CLOUDFLARE_TURNSTILE_SITE_KEY:-}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal

  # Cloudflare Tunnel (for public internet access)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${CLOUDFLARED_CONTAINER_NAME:-smartplay-cloudflared}
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - smartplay-hk-oss
    networks:
      - internal

volumes:
  smartplay_postgres_data:
    driver: local

networks:
  internal:
    driver: bridge
