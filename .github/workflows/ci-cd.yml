name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # CI Job: Test and Quality Checks
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: |
          echo "DATABASE_URL=\"postgresql://test:test@localhost:5432/test\"" > .env.local
          pnpm db:generate

      - name: Run Biome linter
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  # Build Job: Build and Push Docker Image (runs in PARALLEL with test)
  build:
    name: Build Docker Image
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Enable BuildKit inline cache for better cache hits
          build-args: |
            BUILDKIT_INLINE_CACHE=1
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

  # Deploy Job: Deploy to Remote Machine (waits for BOTH test and build)
  deploy:
    name: Deploy to Production
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale Connection
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          echo "🔍 Checking DNS resolution for SSH_HOST..."
          if [ -z "$SSH_HOST" ]; then
            echo "❌ SSH_HOST secret is empty or not set!"
          else
            echo "SSH_HOST is set (value hidden for security)"
            # Silent check
            if getent hosts "$SSH_HOST" >/dev/null 2>&1; then
              echo "✅ DNS lookup successful"
            else
               echo "❌ DNS lookup failed for SSH_HOST"
            fi
          fi

      - name: Setup SSH and Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          echo "📁 Step 1: Setting up SSH directory..."
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Debug: Verify key format
          echo "  → Key file info:"
          echo "    Lines: $(wc -l < ~/.ssh/id_rsa)"
          echo "    First line: $(head -1 ~/.ssh/id_rsa)"
          echo "    Last line: $(tail -1 ~/.ssh/id_rsa)"
          echo "    Fingerprint: $(ssh-keygen -lf ~/.ssh/id_rsa 2>&1 || echo 'Failed to read key')"
          echo "✅ SSH key written"

          if [ -z "$SSH_HOST" ]; then
            echo "❌ Error: SSH_HOST secret is not set"
            exit 1
          fi
          echo "✅ SSH_HOST is set"

          echo "🔑 Step 2: Checking connectivity to SSH_HOST..."

          # Check DNS resolution first
          echo "  → Testing DNS resolution..."
          if ! getent hosts "$SSH_HOST" >/dev/null 2>&1; then
            echo "  → DNS via getent failed"
            # Attempt silent lookup fallback or just fail gracefully without dumping output
            echo "  ⚠️  Could not resolve SSH_HOST via getent"
          fi

          # Check if port 22 is reachable
          echo "  → Testing TCP connection to port 22..."
          timeout 10 bash -c "echo >/dev/tcp/$SSH_HOST/22" 2>&1 && echo "  ✅ Port 22 reachable" || echo "  ⚠️ Port 22 not reachable (may still work)"

          # Run ssh-keyscan with verbose output
          echo "  → Running ssh-keyscan..."
          if ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>&1; then
            echo "✅ Known hosts updated"
          else
            echo "❌ ssh-keyscan failed - output above shows the error"
            exit 1
          fi

          echo "🔧 Step 3: Parsing DATABASE_URL..."
          POSTGRES_USER=$(echo "$DATABASE_URL" | sed -n 's|.*://\([^:]*\):.*|\1|p')
          POSTGRES_PASSWORD=$(echo "$DATABASE_URL" | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p')
          POSTGRES_DB=$(echo "$DATABASE_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')
          POSTGRES_USER=${POSTGRES_USER:-smartplay}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-smartplay_password}
          POSTGRES_DB=${POSTGRES_DB:-smartplay}
          INTERNAL_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
          echo "✅ Database credentials parsed (user: $POSTGRES_USER, db: $POSTGRES_DB)"

          echo "📂 Step 4: Creating remote directory..."
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p ~/smartplay-hk-oss" 2>&1 || {
            echo "❌ SSH connection or mkdir failed"
            exit 1
          }
          echo "✅ Remote directory created"

          echo "📝 Step 5: Creating .env file on remote..."
          ssh "$SSH_USER@$SSH_HOST" "cat > ~/smartplay-hk-oss/.env << 'ENVEOF'
          DATABASE_URL=${INTERNAL_DATABASE_URL}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          NODE_ENV=production
          BASE_URL=${DEPLOY_URL}
          VITE_CLOUDFLARE_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
          CLOUDFLARE_TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
          CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
          IMAGE_TAG=${IMAGE_TAG}
          ENVEOF" || {
            echo "❌ Failed to create .env file"
            exit 1
          }
          echo "✅ .env file created"

          echo "📦 Step 6: Copying docker-compose.yml..."
          scp docker-compose.prod.yml "$SSH_USER@$SSH_HOST:~/smartplay-hk-oss/docker-compose.yml" || {
            echo "❌ SCP failed"
            exit 1
          }
          echo "✅ docker-compose.yml copied"

          echo "🚀 Step 7: Deploying with Docker..."
          ssh "$SSH_USER@$SSH_HOST" "cd ~/smartplay-hk-oss && \
            echo '$GH_TOKEN' | docker login ghcr.io -u '$GH_ACTOR' --password-stdin && \
            docker compose pull && \
            # --force-recreate ensures the container is replaced with the newly pulled image even if config is unchanged
            docker compose up -d --remove-orphans --force-recreate && \
            docker image prune -af --filter 'until=24h'" || {
            echo "❌ Docker deployment failed"
            exit 1
          }
          echo "✅ Deployment complete!"

      - name: Health check
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "⏭️  DEPLOY_URL not configured, skipping health check"
            exit 0
          fi

          echo "⏳ Waiting for services to start..."

          # Retry loop instead of fixed wait
          for i in 1 2 3 4 5; do
            sleep 5
            echo "🔍 Attempt $i: Checking $DEPLOY_URL..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$DEPLOY_URL" 2>/dev/null) || response="000"
            
            if [ "$response" = "200" ] || [ "$response" = "301" ] || [ "$response" = "302" ] || [ "$response" = "403" ]; then
              echo "✅ Health check passed (status: $response)"
              exit 0
            fi
            echo "   Status: $response, retrying..."
          done

          echo "⚠️  Health check inconclusive after 5 attempts (server may still be starting)"
          exit 0

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/id_rsa
