name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # CI Job: Test and Quality Checks
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: |
          echo "DATABASE_URL=\"postgresql://test:test@localhost:5432/test\"" > .env.local
          pnpm db:generate

      - name: Run Biome linter
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  # Build Job: Build and Push Docker Image
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build for AMD64 production
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy Job: Deploy to Remote Machine
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          # Write SSH key using printf to preserve newlines
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Verify SSH_HOST is set
          if [ -z "$SSH_HOST" ]; then
            echo "❌ Error: SSH_HOST secret is not set"
            exit 1
          fi
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Create .env.docker file on remote
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p ~/smartplay-hk-oss"

          # Parse DATABASE_URL to extract postgres credentials
          # Format: postgresql://user:password@host:port/database
          POSTGRES_USER=$(echo "$DATABASE_URL" | sed -n 's|.*://\([^:]*\):.*|\1|p')
          POSTGRES_PASSWORD=$(echo "$DATABASE_URL" | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p')
          POSTGRES_DB=$(echo "$DATABASE_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')

          # Use defaults if parsing fails
          POSTGRES_USER=${POSTGRES_USER:-smartplay}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-smartplay_password}
          POSTGRES_DB=${POSTGRES_DB:-smartplay}

          # The app connects to 'postgres' hostname (docker service name)
          # so we rewrite DATABASE_URL to use the internal docker hostname
          INTERNAL_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"

          ssh "$SSH_USER@$SSH_HOST" "cat > ~/smartplay-hk-oss/.env.docker << 'ENVEOF'
          # ============================================
          # Database Configuration
          # ============================================
          DATABASE_URL=${INTERNAL_DATABASE_URL}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}

          # ============================================
          # Application Configuration
          # ============================================
          NODE_ENV=production
          BASE_URL=${DEPLOY_URL}

          # ============================================
          # Cloudflare Turnstile (Bot Protection)
          # ============================================
          VITE_CLOUDFLARE_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
          CLOUDFLARE_TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}

          # ============================================
          # Cloudflare Tunnel
          # ============================================
          CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
          ENVEOF"

      - name: Copy docker-compose.prod.yml to remote
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          scp docker-compose.prod.yml "$SSH_USER@$SSH_HOST:~/smartplay-hk-oss/docker-compose.yml"

      - name: Deploy using Docker Compose
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "cd ~/smartplay-hk-oss && \
            echo '$GH_TOKEN' | docker login ghcr.io -u '$GH_ACTOR' --password-stdin && \
            docker compose --env-file .env.docker pull && \
            docker compose --env-file .env.docker up -d --remove-orphans --force-recreate && \
            docker image prune -af --filter 'until=24h'"

      - name: Health check
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          # Skip if DEPLOY_URL is not set
          if [ -z "$DEPLOY_URL" ]; then
            echo "⏭️  DEPLOY_URL not configured, skipping health check"
            exit 0
          fi

          echo "⏳ Waiting 30s for services to start..."
          sleep 30

          echo "🔍 Checking $DEPLOY_URL..."
          response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "$DEPLOY_URL" 2>/dev/null) || response="000"

          echo "📊 HTTP status: $response"

          if [ "$response" = "200" ] || [ "$response" = "301" ] || [ "$response" = "302" ] || [ "$response" = "403" ]; then
            echo "✅ Deployment health check passed (server is responding)"
            exit 0
          elif [ "$response" = "000" ]; then
            echo "⚠️  Could not reach server (may still be starting)"
            exit 0
          else
            echo "❌ Deployment health check failed with status: $response"
            exit 1
          fi

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/id_rsa
