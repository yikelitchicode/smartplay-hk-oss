name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # CI Job: Test and Quality Checks
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: |
          echo "DATABASE_URL=\"postgresql://test:test@localhost:5432/test\"" > .env.local
          pnpm db:generate

      - name: Run Biome linter
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  # Build Job: Build and Push Docker Image
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build for AMD64 production
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy Job: Deploy to Remote Machine
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # environment: production  # Uncomment after creating environment in repo settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env.docker file on remote
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ~/smartplay-hk-oss"

          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cat > ~/smartplay-hk-oss/.env.docker << 'EOF'
          # ============================================
          # Database Configuration
          # ============================================
          DATABASE_URL=${{ secrets.DATABASE_URL }}

          # ============================================
          # Application Configuration
          # ============================================
          NODE_ENV=production
          BASE_URL=${{ secrets.DEPLOY_URL }}

          # ============================================
          # Cloudflare Turnstile (Bot Protection)
          # ============================================
          VITE_CLOUDFLARE_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
          CLOUDFLARE_TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}

          # ============================================
          # Crawler Configuration
          # ============================================
          # Note: Crawler configuration is in src/lib/crawler/config.ts
          # The scheduler runs automatically via scripts/scheduler.ts
          # Edit src/lib/crawler/config.ts to customize crawler behavior

          # ============================================
          # Cloudflare Tunnel
          # ============================================
          CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          EOF"

      - name: Copy docker-compose.yml to remote
        run: |
          scp docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/smartplay-hk-oss/

      - name: Deploy using Docker Compose
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            cd ~/smartplay-hk-oss

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker compose --env-file .env.docker pull

            # Stop old containers and start new ones
            # Note: Migrations run automatically via docker-entrypoint.sh
            docker compose --env-file .env.docker up -d --remove-orphans --force-recreate

            # Clean up old images
            docker image prune -af --filter "until=24h"
          ENDSSH

      - name: Health check
        run: |
          # Skip if DEPLOY_URL is not set
          if [ -z "${{ secrets.DEPLOY_URL }}" ]; then
            echo "⏭️  DEPLOY_URL not configured, skipping health check"
            exit 0
          fi

          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}" || echo "000")
          if [ "$response" != "200" ] && [ "$response" != "000" ]; then
            echo "❌ Deployment health check failed with status: $response"
            exit 1
          fi
          echo "✅ Deployment health check passed with status: $response"

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/id_rsa
